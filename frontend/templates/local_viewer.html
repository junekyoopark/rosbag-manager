<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RRD Viewer</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #000;
        }

        .viewer-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            height: 38px;
            box-sizing: border-box;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }

        .viewer-bar__back {
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            white-space: nowrap;
        }
        .viewer-bar__back:hover { color: var(--text-primary); }

        .viewer-bar__title {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #rerun-container {
            width: 100%;
            height: calc(100vh - 38px);
            position: relative;
        }

        /* Drop overlay — shown until a file is loaded */
        #drop-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg-base);
            color: var(--text-secondary);
            z-index: 10;
            transition: background 0.2s;
        }

        #drop-overlay.drag-over {
            background: var(--bg-elevated);
            border: 3px dashed var(--accent-primary);
        }

        #drop-overlay svg { color: var(--text-muted); }

        #drop-overlay p { font-size: 15px; font-weight: 500; }

        #drop-overlay small { font-size: 12px; color: var(--text-muted); }

        #file-input { display: none; }

        #error-msg {
            display: none;
            color: var(--accent-error);
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="viewer-bar">
    <a href="/" class="viewer-bar__back">← Library</a>
    <span class="viewer-bar__title" id="file-label">Local RRD Viewer</span>
    <input type="file" id="file-input" accept=".rrd">
    <button class="btn btn--secondary btn--sm" onclick="document.getElementById('file-input').click()">
        Open file…
    </button>
</div>

<div id="rerun-container">
    <div id="drop-overlay">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop a .rrd file here</p>
        <small>or click <strong>Open file…</strong> above</small>
        <p id="error-msg"></p>
    </div>
</div>

<script>
const overlay   = document.getElementById('drop-overlay');
const container = document.getElementById('rerun-container');
const fileInput = document.getElementById('file-input');
const fileLabel = document.getElementById('file-label');
const errorMsg  = document.getElementById('error-msg');

let _viewer = null; // WebViewer instance

// ── Drag-and-drop onto the overlay ────────────────────────────
overlay.addEventListener('dragover', (e) => {
    e.preventDefault();
    overlay.classList.add('drag-over');
});
overlay.addEventListener('dragleave', () => overlay.classList.remove('drag-over'));
overlay.addEventListener('drop', (e) => {
    e.preventDefault();
    overlay.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
});
overlay.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
    fileInput.value = '';
});

// ── Load file into Rerun viewer ───────────────────────────────
async function loadFile(file) {
    if (!file.name.endsWith('.rrd')) {
        showError('Only .rrd files are supported.');
        return;
    }

    errorMsg.style.display = 'none';
    fileLabel.textContent = 'Uploading…';

    try {
        // Upload to server so the viewer can fetch it over a normal HTTP URL
        // (blob: URLs are not reliably fetchable from inside the Rerun WASM module)
        const form = new FormData();
        form.append('file', file);
        const resp = await fetch('/bags/local/temp-rrd', { method: 'POST', body: form });
        if (!resp.ok) throw new Error(`Upload failed: ${resp.status}`);
        const { url } = await resp.json();

        fileLabel.textContent = file.name;

        const { WebViewer } = await import('/static/vendor/rerun/index.js');

        // Stop previous viewer so the container is clean for the new recording
        if (_viewer) {
            _viewer.stop?.();
            _viewer = null;
        }

        overlay.style.display = 'none';
        _viewer = new WebViewer();
        await _viewer.start(window.location.origin + url, container, {
            width: '100%',
            height: '100%',
            hide_welcome_screen: true,
        });

    } catch (err) {
        _viewer = null;
        overlay.style.display = 'flex';
        fileLabel.textContent = 'Local RRD Viewer';
        showError('Failed to load: ' + err.message);
        console.error(err);
    }
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
}
</script>
</body>
</html>
