{% extends "base.html" %}
{% block title %}Change Password — ROSBAG Manager{% endblock %}

{% block nav_extra %}{% endblock %}

{% block content %}
<div style="max-width:400px;margin:80px auto;padding:0 24px">
    <h1 style="font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:24px">Change Password</h1>

    {% if error %}
    <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:var(--accent-error);margin-bottom:16px">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:#15803d;margin-bottom:16px">
        {{ success }}
    </div>
    {% endif %}

    <form method="post" action="/auth/change-password"
          style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column;gap:14px">
        <div style="display:flex;flex-direction:column;gap:5px">
            <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-muted)">Current password</label>
            <input type="password" name="current_password" required autocomplete="current-password"
                   style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-elevated);color:var(--text-primary);font-size:13px;outline:none">
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
            <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-muted)">New password</label>
            <input type="password" name="new_password" required autocomplete="new-password" minlength="8"
                   style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-elevated);color:var(--text-primary);font-size:13px;outline:none">
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
            <label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-muted)">Confirm new password</label>
            <input type="password" name="confirm_password" required autocomplete="new-password" minlength="8"
                   style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-elevated);color:var(--text-primary);font-size:13px;outline:none">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
            <a href="/" class="btn btn--secondary">Cancel</a>
            <button type="submit" class="btn btn--primary">Update password</button>
        </div>
    </form>
</div>
{% endblock %}
