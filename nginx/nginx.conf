worker_processes auto;
events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 55G;
    client_body_timeout  3600s;
    send_timeout         3600s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/wasm
        font/woff2 font/woff;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream lichtblick {
        server lichtblick:8080;
    }

    upstream robot_ws {
        server ROBOT_WS_HOST_PLACEHOLDER:8765;  # replaced by entrypoint.sh from ROBOT_WS_HOST env var
    }

    server {
        listen 80;
        server_name _;
        resolver 127.0.0.11 valid=5s;

        # Static RRD files — served directly from disk, range requests for Rerun viewer
        location /rrd/ {
            alias /data/rrd/;
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers Range;
            add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges";
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Accept-Ranges bytes;
            sendfile on;
            sendfile_max_chunk 2m;
            tcp_nopush on;
            tcp_nodelay on;
            types { application/octet-stream rrd; }
        }

        # Thumbnails
        location /thumbnails/ {
            alias /data/thumb/;
            add_header Cache-Control "public, max-age=86400";
            expires 1d;
        }

        # SSE endpoints — must not buffer
        location ~ ^/api/jobs/.*/stream$ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # Robot WebSocket proxy — set ROBOT_WS_HOST in .env to enable
        location /robot-ws {
            proxy_pass http://robot_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Lichtblick live viewer — injecting <base> so webpack's auto publicPath resolves correctly
        location /lichtblick/ {
            proxy_pass http://lichtblick/;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;

            sub_filter '<head>' '<head><base href="/lichtblick/">';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # Everything else → FastAPI
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 3600s;
        }
    }
}
